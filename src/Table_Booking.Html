                <!-- Logo -->

                <!-- Menu -->

                <li><a href="./index.html">HOME</a></li>

        <!-- Hero Content -->

            <h1
                class="font-primary text-[#FFF0D2] text-3xl md:text-5xl font-semibold">
                Your Next Exceptional Meal Awaits </h1>

            <div class="w-20 h-[2px] bg-[#D4AF37] my-4"></div>

<!--<body class="bg-[#F5F5F5] font-secondary">-->

<section class="py-10 md:py-20 px-4">

    <div class="max-w-5xl mx-auto">

        <!-- Reservation Card -->
        <div class="bg-[#F5F0E4] border border-[#C8A85D] rounded-3xl shadow-md p-6 md:p-12">

            <!-- Heading -->

            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 mb-10">

                <img
                    src="./images/calendar-icon.png"
                    alt="Calendar"
                    class="w-12 h-12 md:w-16 md:h-16 object-contain"
                >

                <div>

                    <h1 class="font-primary text-3xl md:text-5xl font-bold text-black">
                        RESERVE YOUR TABLE
                    </h1>

                    <p class="mt-2 text-gray-700 text-base md:text-xl">
                        Fill the details below and we will confirm your reservation.
                    </p>

                </div>

            </div>

            <!-- Form -->

            <form class="space-y-8">

                <!-- Full Name -->

                <div>

                    <label class="block text-xl font-medium mb-3">
                        Full Name
                    </label>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

                        <select
                            class="border border-[#C8A85D] bg-transparent rounded px-4 py-3 outline-none"
                        >
                            <option>Mr.</option>
                            <option>Mrs.</option>
                            <option>Ms.</option>
                        </select>

                        <input
                            type="text"
                            placeholder="Enter your First Name"
                            class="border border-[#C8A85D] bg-transparent rounded px-4 py-3 outline-none"
                        >

                        <input
                            type="text"
                            placeholder="Enter your Last Name"
                            class="border border-[#C8A85D] bg-transparent rounded px-4 py-3 outline-none"
                        >

                    </div>

                </div>

                <!-- Phone + Date -->

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>

                        <label class="block text-xl font-medium mb-3">
                            Phone Number
                        </label>

                        <input
                            type="tel"
                            placeholder="Enter Your Phone Number"
                            class="w-full border border-[#C8A85D] bg-transparent rounded px-4 py-3 outline-none"
                        >

                    </div>

                    <div>

                        <label class="block text-xl font-medium mb-3">
                            Date
                        </label>

                        <input
                            type="date"
                            class="w-full border border-[#C8A85D] bg-transparent rounded px-4 py-3 outline-none"
                        >

                    </div>

                </div>

                <!-- Time + Members -->

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <div>

                        <label class="block text-xl font-medium mb-3">
                            Time
                        </label>

                        <select
                            class="w-full border border-[#C8A85D] bg-transparent rounded px-4 py-3 outline-none"
                        >
                            <option>Select Time</option>
                            <option>10:00 AM</option>
                            <option>11:00 AM</option>
                            <option>12:00 PM</option>
                            <option>01:00 PM</option>
                            <option>02:00 PM</option>
                        </select>

                    </div>

                    <div>

                        <label class="block text-xl font-medium mb-3">
                            Members
                        </label>

                        <select
                            class="w-full border border-[#C8A85D] bg-transparent rounded px-4 py-3 outline-none"
                        >
                            <option>Select number of members</option>
                            <option>1 Member</option>
                            <option>2 Members</option>
                            <option>3 Members</option>
                            <option>4 Members</option>
                            <option>5+ Members</option>
                        </select>

                    </div>

                </div>

                <!-- Special Request -->

                <div>

                    <label class="block text-xl font-medium mb-3">
                        Special Request
                    </label>

                    <textarea
                        rows="4"
                        placeholder="Any special request?"
                        class="w-full border border-[#C8A85D] bg-transparent rounded px-4 py-3 outline-none resize-none"
                    ></textarea>

                </div>

                <!-- Button -->

                <button
                    type="submit"
                    class="w-full bg-[#0B4D16] text-white text-xl md:text-3xl font-bold py-4 rounded hover:bg-[#083B11] transition"
                >
                    BOOK NOW
                </button>

                <!-- Security Text -->

                <div class="text-center text-sm text-gray-600">

                    🔒 Your information is secure and will not be shared.

                </div>

            </form>

        </div>

    </div>

</section>



    </body>
    </html>
